# Prompt templates for Stage 2 LLM signal decision
# All prompts are Jinja2-style — variables are substituted at runtime.
# NO hardcoded values allowed in prompts.

system_prompt: |
  You are an expert options trading signal assistant.
  Your job is to evaluate Stage 1 technical filter candidates and produce a
  definitive GO/NO_GO signal with a structured JSON output.

  Available signal types:
  - SELL_PUTS  : Oversold bounce play, bullish/neutral, 2-week expiry
  - SELL_CALLS : Overbought mean-reversion, bearish/neutral, 2-week expiry
  - BUY_LEAPS  : Long-term bullish momentum, 3-6 month expiry

  Rules:
  1. Output valid JSON only — no markdown, no explanation outside JSON
  2. Choose AT MOST one signal type (the strongest)
  3. Set confidence_level based on indicator quality and number of passing filters
  4. Strike must be ATM or slightly OTM; delta ~0.25 for puts, ~0.25 for calls
  5. Stop loss must be ATR-adjusted — never wider than 2x ATR
  6. Risk flags: flag high IV Rank (>80), nearby earnings (<30d), low liquidity
  7. If no signal is strong enough, output NO_TRADE

user_prompt_template: |
  TICKER: {ticker}
  Current Price: ${price:.2f}

  === TECHNICAL INDICATORS ===
  RSI_14:        {rsi}
  IV Rank:       {iv_rank}%
  MACD:          {macd}
  MACD_Signal:   {macd_signal}
  SMA_20:        {sma20}
  SMA_200:       {sma200}
  BB_Upper:      {bb_upper}
  BB_Lower:      {bb_lower}
  ATR_14:        {atr}
  Volume_Ratio:  {vol_ratio}
  Current Price: ${price:.2f}

  === STAGE 1 FILTER CANDIDATES ===
  {stage1_candidates}

  Based on the above data, produce your JSON signal decision.

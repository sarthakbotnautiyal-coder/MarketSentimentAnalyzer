# Signal threshold configuration for MarketSentimentAnalyzer hybrid pipeline
# All numeric thresholds are externalized — no hardcoding in Stage1HardFilters

sell_puts:
  # RSI threshold: must be below this (oversold)
  rsi_max: 40
  # Ideal RSI range for quality entry
  rsi_ideal_min: 25
  rsi_ideal_max: 40
  # IV Rank: high IV environment preferred for premium selling
  iv_rank_min: 60
  # Price must be above SMA20 (uptrend confirmation)
  price_above_sma20: true
  # Entry near lower Bollinger Band (oversold bounce setup)
  bb_lower_proximity: true
  # Volume confirmation: today's volume > 10-day average
  vol_ratio_min: 1.0
  # Earnings within 14 days: skip (volatility crush risk)
  earnings_exclude_days: 14

sell_calls:
  # RSI threshold: must be above this (overbought)
  rsi_min: 65
  # IV Rank: high IV environment preferred
  iv_rank_min: 60
  # Price below SMA20 (downtrend confirmation)
  price_below_sma20: true
  # Entry near upper Bollinger Band (overbought entry)
  bb_upper_proximity: true
  # Volume confirmation
  vol_ratio_min: 1.0
  # Earnings exclusion
  earnings_exclude_days: 14

buy_leaps:
  # Price must be above SMA200 (long-term uptrend)
  price_above_sma200: true
  # RSI in bullish territory
  rsi_min: 50
  # MACD above zero (positive momentum)
  macd_positive: true
  # Volume confirmation
  vol_ratio_min: 1.0
  # Low IV preferred for LEAPS (cheaper options)
  iv_rank_max: 40
  # Earnings exclusion
  earnings_exclude_days: 14